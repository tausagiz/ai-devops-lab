name: Tests

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests
        run: |
          if ls tests/unit/test_*.py >/dev/null 2>&1; then
            pytest tests/unit -v --tb=short
          else
            echo "No unit tests to run."
          fi

      - name: Run integration tests
        run: |
          if ls tests/integration/test_*.py >/dev/null 2>&1; then
            pytest tests/integration -v --tb=short
          else
            echo "No integration tests to run."
          fi

      - name: Coverage report
        run: |
          if find tests -type f -name 'test_*.py' | grep -q .; then
            pytest tests/ --cov --cov-report=term-missing
          else
            echo "No tests available for coverage report."
          fi
